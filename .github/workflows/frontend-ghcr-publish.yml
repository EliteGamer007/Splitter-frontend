name: Frontend GHCR Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/splitter-frontend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (best-effort)
        run: |
          if npm pkg get scripts.lint | grep -qv "null"; then
            if npm ls eslint --depth=0 >/dev/null 2>&1; then
              npm run lint
            else
              echo "Skipping lint: eslint dependency not installed in this repo."
            fi
          else
            echo "Skipping lint: no lint script configured."
          fi

      - name: Stable test suite (gating)
        run: npm test -- --ci --watchAll=false __tests__/lib/api.test.ts

      - name: Full test suite (non-blocking diagnostics)
        continue-on-error: true
        run: npm test -- --ci --watchAll=false

      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
