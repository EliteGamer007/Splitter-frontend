name: Frontend Deploy (Template)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Trigger frontend deploy hook
        run: curl -fsS -X POST "${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}"
